# systemix.config.yaml — your instance topology. Committed; contains NO secrets.
# Secrets (Figma/PostHog keys) live in ~/.systemix/config.json or env vars.
# Edit by hand or re-run `npx systemix init` to regenerate.
version: 1
surfaces:
  - design-system
  - landing
  - onboarding
signals:
  posthog:
    enabled: true
    poll_interval_sec: 300
    region: eu                              # data residency (Connecta K-12 story)
    host: https://eu.posthog.com            # server API host for evidence queries
    ingest_host: https://eu.i.posthog.com   # browser capture host (NEXT_PUBLIC_POSTHOG_HOST)
  vercel:
    enabled: true
  figma:
    enabled: true
  social:
    enabled: false
hermes:
  model: hermes3
  endpoint: http://localhost:11434
  autonomy: ghost
  thresholds:
    high: 0.85
    medium: 0.55
self_improvement:
  mode: audit
  meta_contract: experiments/meta/hermes-accuracy.mdx
  audit_window_days: 90
trust:
  orchestrator_tier: 0   # Ghost Mode at init — never executes autonomously without config
  hermes_tier: 0
atlas:
  # Instance vocabulary for the Workflow Atlas (contract/workflows/*.mdx).
  # personas = tab order; agents = step owners; surfaces = prototype frames.
  # persona/agent/surface in a workflow contract MUST be declared here.
  personas:
    - founder
    - designer
    - engineer
  agents:
    hermes:
      label: Hermes
    orchestrator:
      label: Orchestrator
    scout:
      label: Scout
    flux:
      label: Flux
    ada:
      label: Ada
    echo:
      label: Echo
    prism:
      label: Prism
    sage:
      label: Sage
    ship:
      label: Ship
  surfaces:
    - phone
    - tablet
    - desktop
